<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets - Professional</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        /* Main Ticket Container */
        .ticket-container {
            width: 90%;
            max-width: 380px;
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Blue Header Section */
        .ticket-header {
            background-color: #026cdf;
            color: white;
            padding: 20px;
            position: relative;
        }

        .entry-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .seating-grid {
            display: flex;
            justify-content: space-between;
            text-align: left;
        }

        .seat-box {
            flex: 1;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.8;
            display: block;
        }

        .value {
            font-size: 24px;
            font-weight: bold;
        }

        /* Image Section */
        .event-banner {
            width: 100%;
            height: 200px;
            background-image: url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }

        /* Event Details */
        .event-info {
            padding: 20px;
            background-color: white;
        }

        .event-title {
            font-size: 18px;
            font-weight: 800;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            color: #111;
        }

        .event-time, .event-location {
            font-size: 13px;
            color: #555;
            margin: 2px 0;
        }

        /* Mobile Ticket Footer */
        .ticket-footer {
            padding: 20px;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .mobile-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            display: block;
        }

        .view-btn {
            background-color: #000;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .view-btn::before {
            content: '🎟️';
            margin-right: 10px;
        }

        .details-link {
            display: block;
            margin-top: 15px;
            color: #888;
            font-size: 12px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="ticket-container">
        <div class="ticket-header">
            <div class="entry-label">Entry 1</div>
            <div class="seating-grid">
                <div class="seat-box">
                    <span class="label">SEC</span>
                    <span class="value">B5</span>
                </div>
                <div class="seat-box">
                    <span class="label">ROW</span>
                    <span class="value">8</span>
                </div>
                <div class="seat-box" style="text-align: right;">
                    <span class="label">SEAT</span>
                    <span class="value">7</span>
                </div>
            </div>
        </div>

        <div class="event-banner"></div>

        <div class="event-info">
            <h2 class="event-title">BTS WORLD TOUR 'ARIRANG' IN TORONTO</h2>
            <p class="event-time">Sat, Aug 22, 2026 • 8:00 PM</p>
            <p class="event-location">Rogers Stadium Toronto, ON, Canada</p>
        </div>

        <div class="ticket-footer">
            <span class="mobile-label">Mobile Ticket</span>
            <button class="view-btn">View Ticket</button>
            <a href="#" class="details-link">Ticket Details</a>
        </div>
    </div>

</body>
</html>
