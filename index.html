<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketmaster - Discover Events</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #f4f4f4; color: #1f1f1f; }
        .tm-header { background-color: #1f262d; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tm-logo { color: white; font-size: 20px; font-weight: bold; text-decoration: none; }
        .search-section { background-color: #026cdf; padding: 40px 20px; text-align: center; color: white; }
        .search-bar { width: 100%; max-width: 500px; padding: 15px 20px; border-radius: 30px; border: none; font-size: 16px; outline: none; }
        .content-body { padding: 20px; max-width: 600px; margin: 0 auto; }
        .event-card { background: white; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; margin-bottom: 25px; }
        .event-image { width: 100%; height: 180px; background-size: cover; background-position: center; }
        .event-details { padding: 15px; }
        .date-blue { color: #026cdf; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .event-name { font-size: 19px; font-weight: bold; margin: 8px 0; }
        .sub-text { color: #666; font-size: 13px; margin-bottom: 15px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 15px; }
        .see-tickets-btn { background-color: #026cdf; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <div class="tm-header"><a href="#" class="tm-logo">ticketmaster</a><div style="color: white; font-size: 20px;">👤</div></div>
    <div class="search-section"><h1>Discover Events Near You</h1><input type="text" class="search-bar" placeholder="Search for events"></div>
    <div class="content-body">
        
        <div class="event-card">
            <div class="event-image" style="background-image: url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=800&q=80')"></div>
            <div class="event-details">
                <span class="date-blue">MAY 18 • SUN • 7:00 PM</span>
                <div class="event-name">Morgan Wallen: One Night At A Time</div>
                <div class="sub-text">Nashville, TN • Nissan Stadium</div>
                <div class="card-footer">
                    <strong>From $285</strong>
                    <a href="ticket.html?event=Morgan Wallen&date=Sun, May 18 • 7:00 PM&venue=Nissan Stadium, Nashville, TN" class="see-tickets-btn">See Tickets</a>
                </div>
            </div>
        </div>

        <div class="event-card">
            <div class="event-image" style="background-image: url('https://images.unsplash.com/photo-1540324155974-7523202daa3f?auto=format&fit=crop&w=800&q=80')"></div>
            <div class="event-details">
                <span class="date-blue">JUNE 02 • MON • 7:30 PM</span>
                <div class="event-name">WWE Monday Night RAW</div>
                <div class="sub-text">Chicago, IL • United Center</div>
                <div class="card-footer">
                    <strong>From $55</strong>
                    <a href="ticket.html?event=WWE Monday Night RAW&date=Mon, June 02 • 7:30 PM&venue=United Center, Chicago, IL" class="see-tickets-btn">See Tickets</a>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
