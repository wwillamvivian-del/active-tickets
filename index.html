<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketmaster - Discover Events</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: #ffffff;
            color: #1f1f1f;
        }

        /* Top Header */
        .tm-header {
            background-color: #1f262d;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tm-logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
        }

        /* Blue Search Section */
        .search-section {
            background-color: #026cdf;
            padding: 40px 20px;
            text-align: center;
            color: white;
        }

        .search-section h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            outline: none;
        }

        /* Event Grid */
        .content-body {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .event-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .event-image {
            width: 100%;
            height: 200px;
            background-image: url('https://images.unsplash.com/photo-1459749411177-042180ce673c?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
        }

        .event-details {
            padding: 15px;
        }

        .date-blue {
            color: #026cdf;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .event-name {
            font-size: 20px;
            font-weight: bold;
            margin: 8px 0;
        }

        .sub-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .tickets-left {
            color: #c00;
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .price {
            font-weight: bold;
            font-size: 18px;
        }

        .see-tickets-btn {
            background-color: #026cdf;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .see-tickets-btn:hover {
            background-color: #0156b3;
        }
    </style>
</head>
<body>

    <div class="tm-header">
        <a href="#" class="tm-logo">ticketmaster</a>
        <div style="color: white; font-size: 20px;">👤</div>
    </div>

    <div class="search-section">
        <h1>Discover Events Near You</h1>
        <input type="text" class="search-bar" placeholder="Search for artists, venues, or events">
    </div>

    <div class="content-body">
        
        <div class="event-card">
            <div class="event-image"></div>
            <div class="event-details">
                <span class="date-blue">OCT 24 • SAT • 7:00 PM</span>
                <div class="event-name">The Neon Midnight Tour</div>
                <div class="sub-text">Cyber Synth • USA Tour</div>
                <div class="tickets-left">10 Tickets Remaining</div>
                
                <div class="card-footer">
                    <div class="price">From $45</div>
                    <a href="https://active-tickets.onrender.com" class="see-tickets-btn">See Tickets</a>
                </div>
            </div>
        </div>

        <div class="event-card">
            <div class="event-image" style="background-image: url('https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?auto=format&fit=crop&w=800&q=80')"></div>
            <div class="event-details">
                <span class="date-blue">NOV 12 • THU • 8:30 PM</span>
                <div class="event-name">LA Summer Festival</div>
                <div class="sub-text">Los Angeles, CA • Rogers Center</div>
                <div class="tickets-left">Limited Availability</div>
                
                <div class="card-footer">
                    <div class="price">From $120</div>
                    <a href="https://active-tickets.onrender.com" class="see-tickets-btn">See Tickets</a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
