<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; margin: 0; color: white; }
        .nav-header { display: flex; justify-content: space-between; padding: 15px; font-weight: bold; border-bottom: 1px solid #333; }
        .tabs { display: flex; text-align: center; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 15px; font-size: 12px; font-weight: bold; text-transform: uppercase; color: #888; }
        .active-tab { border-bottom: 3px solid white; color: white; }
        .ticket-body { padding: 20px; display: flex; justify-content: center; }
        .ticket-card { width: 100%; max-width: 350px; background: white; border-radius: 15px; overflow: hidden; color: #000; }
        .blue-header { background: #026cdf; color: white; padding: 20px; position: relative; }
        .seating { display: flex; justify-content: space-between; margin-top: 10px; }
        .seat-item { flex: 1; }
        .label { font-size: 10px; opacity: 0.8; display: block; }
        .value { font-size: 22px; font-weight: bold; }
        .event-img { width: 100%; height: 200px; background: url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?auto=format&fit=crop&w=500&q=80') center/cover; }
        .event-info { padding: 20px; text-align: left; }
        .event-title { font-size: 18px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .event-meta { font-size: 13px; color: #666; margin-top: 5px; }
        .footer-action { padding: 20px; text-align: center; border-top: 1px dotted #ccc; }
        .view-btn { background: #000; color: white; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; border: none; font-size: 16px; }
    </style>
</head>
<body>
    <div class="nav-header"><span>✕</span> <span>My Tickets</span> <span>Help</span></div>
    <div class="tabs"><div class="tab active-tab">My Tickets</div><div class="tab">Add-Ons</div></div>
    <div class="ticket-body">
        <div class="ticket-card">
            <div class="blue-header">
                <div style="font-size: 13px; margin-bottom: 5px;">Entry 1</div>
                <div class="seating">
                    <div class="seat-item"><span class="label">SEC</span><span class="value">B5</span></div>
                    <div class="seat-item"><span class="label">ROW</span><span class="value">8</span></div>
                    <div class="seat-item"><span class="label">SEAT</span><span class="value">7</span></div>
                </div>
            </div>
            <div class="event-img"></div>
            <div class="event-info">
                <h2 id="display-title" class="event-title">LOADING...</h2>
                <p id="display-meta" class="event-meta"></p>
            </div>
            <div class="footer-action">
                <p style="font-size: 14px; color: #666; margin-bottom: 10px;">Mobile Ticket</p>
                <button class="view-btn">View Ticket</button>
            </div>
        </div>
    </div>

    <script>
        // This script reads the info from the URL and puts it on the ticket
        const params = new URLSearchParams(window.location.search);
        if(params.has('event')) {
            document.getElementById('display-title').innerText = params.get('event');
            document.getElementById('display-meta').innerHTML = params.get('date') + "<br>" + params.get('venue');
        }
    </script>
</body>
</html>
