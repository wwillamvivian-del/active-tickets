<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #000; margin: 0; color: white; overflow-x: hidden; }
        .nav-head { display: flex; justify-content: space-between; padding: 15px 20px; font-weight: 600; }
        .tabs { display: flex; border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; }
        .active { color: #fff; border-bottom: 3px solid #fff; }
        
        .ticket-wrap { padding: 25px 15px; display: flex; justify-content: center; }
        .t-card { width: 100%; max-width: 350px; background: white; border-radius: 18px; overflow: hidden; color: #000; }
        .blue-top { background: #026cdf; color: white; padding: 20px; position: relative; }
        .s-grid { display: flex; justify-content: space-between; margin-top: 10px; }
        .s-label { font-size: 11px; font-weight: 600; opacity: 0.9; display: block; }
        .s-val { font-size: 26px; font-weight: 800; }
        
        .event-poster { width: 100%; height: 210px; background: url('https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?auto=format&fit=crop&w=500&q=80') center/cover; }
        .info-box { padding: 20px; border-bottom: 1px dashed #ccc; }
        .t-title { font-size: 19px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .t-meta { font-size: 14px; color: #555; margin-top: 8px; }
        
        .footer { padding: 20px; text-align: center; }
        /* Professional Black Button */
        .view-btn { 
            background: #000; 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border-radius: 10px; 
            font-weight: 700; 
            border: none; 
            font-size: 16px; 
            cursor: pointer; 
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="nav-head"><span>✕</span> <span>My Tickets</span> <span>Help</span></div>
    <div class="tabs"><div class="tab active">My Tickets</div><div class="tab">Add-Ons</div></div>
    
    <div class="ticket-wrap">
        <div class="t-card">
            <div class="blue-top">
                <div style="font-size: 14px; margin-bottom: 10px;">Entry 1</div>
                <div class="s-grid">
                    <div><span class="s-label">SEC</span><span class="s-val">B5</span></div>
                    <div><span class="s-label">ROW</span><span class="s-val">8</span></div>
                    <div><span class="s-label">SEAT</span><span class="s-val">7</span></div>
                </div>
            </div>
            <div class="event-poster"></div>
            <div class="info-box">
                <h2 id="name" class="t-title">LOADING...</h2>
                <p id="meta" class="t-meta"></p>
            </div>
            <div class="footer">
                <p style="font-size: 14px; color: #666; font-weight: 600; margin-bottom: 15px;">Mobile Ticket</p>
                
                <a id="email-redirect" href="#" class="view-btn">View Ticket</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const eventName = params.get('event') || "Ticket";
        
        if(params.has('event')) {
            document.getElementById('name').innerText = eventName;
            document.getElementById('meta').innerHTML = params.get('date') + "<br>" + params.get('venue');
        }

        // SET THE EMAIL HERE
        const myEmail = "yourname@email.com"; // Replace with your actual email
        const subject = encodeURIComponent("Ticket Verification: " + eventName);
        const body = encodeURIComponent("Hello, I am clicking to view my ticket for " + eventName + ". Please verify my entry.");

        // Apply the mailto link to the button
        document.getElementById('email-redirect').href = "mailto:" + myEmail + "?subject=" + subject + "&body=" + body;
    </script>
</body>
</html>
